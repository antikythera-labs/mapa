name: contracts

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/test-contracts.yml'
  pull_request:
    paths:
      - 'contracts/**'
      - '.github/workflows/test-contracts.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: contracts

jobs:
  test:
    name: forge fmt + build + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show Foundry version
        run: forge --version

      - name: Format check
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vvv
        env:
          FOUNDRY_PROFILE: default
