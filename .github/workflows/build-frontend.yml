name: frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/build-frontend.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  build:
    name: lint + typecheck + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_CHAIN_ID: '5003'
          NEXT_PUBLIC_BET_MARKET_ADDRESS: '0x0000000000000000000000000000000000000000'
          NEXT_PUBLIC_ARENA_REGISTRY_ADDRESS: '0x0000000000000000000000000000000000000000'
          NEXT_PUBLIC_ODDS_ORACLE_ADDRESS: '0x0000000000000000000000000000000000000000'
          NEXT_PUBLIC_USDC_ADDRESS: '0x0000000000000000000000000000000000000000'
          NEXT_PUBLIC_WC_PROJECT_ID: ${{ secrets.WC_PROJECT_ID || 'placeholder' }}
