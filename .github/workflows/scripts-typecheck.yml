name: scripts

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/scripts-typecheck.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - '.github/workflows/scripts-typecheck.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: scripts

jobs:
  typecheck:
    name: tsc --noEmit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit
