[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
gas_reports = ["BetMarket", "ArenaRegistry", "OddsOracle"]
fs_permissions = [{ access = "read", path = "./" }]

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]

[profile.ci]
fuzz = { runs = 10_000 }
verbosity = 4

[rpc_endpoints]
mantle_mainnet = "${MANTLE_MAINNET_RPC_URL}"
mantle_sepolia = "${MANTLE_SEPOLIA_RPC_URL}"

[etherscan]
# Etherscan API V2 unified endpoint — single key works across 60+ EVM chains.
# Mantlescan migrated to Etherscan V2 in 2026 — get key at https://etherscan.io/myapikey
mantle_mainnet = { key = "${MANTLESCAN_API_KEY}", url = "https://api.etherscan.io/v2/api", chain = 5000 }
mantle_sepolia = { key = "${MANTLESCAN_API_KEY}", url = "https://api.etherscan.io/v2/api", chain = 5003 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
